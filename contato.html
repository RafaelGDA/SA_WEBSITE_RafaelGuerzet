<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <!-- IMPORTAR BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- IMPORTAR ICONS GOOGLE -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=home" />

    <!-- IMPORTAR FONTE GOOGLE -->
     

    <!-- IMPORTAR CSS -->
    <link rel="stylesheet" href="./style.css">

    <!-- Icon do site -->
    <link rel="icon" href="./image/imagemIcon1.png" />
  </head>
</head>
<body>
    <header>
       <div class="topo container">
              <!-- Nome site -->
              <div class="nome-site">
                <h1>PixelForge Studios</h1>
                <p>Feitos por jogadores, moldado por sonhos.</p>
              </div>
            
              <!-- Menu de navegação -->
              <nav class="navegacao conteiner">
                  <ul class="menu">
                    <a href="./index.html"><li>INICIO</li></a>
                    <a href="./pagina2.html"><li>BIBLIOTECA</li></a>
                    <a href="./pagina3.html"><li>GALERIA</li></a>
                    <a href="./contato.html"><li>CONTATO</li></a>
                  </ul>
              </nav>
       </div>
    </header>

    <main>
        <fieldset class="formulario">
            <h3>Fale Conosco</h3>

            <label class="nome">
            <input
            type="text"
            id="caixa-nome"
            name="caixa-nome"
            placeholder="Nome"
            />
            </label>

            <br />
            <br />

            <!-- Forma 2 - input dentre do label -->
            <label class="email">
            <input
                type="email"
                name="caixa-email"
                id="caixa-email"
                placeholder="email@email.com"
            />
            </label>

            <br>
            <br>

            <label class="assunto">
                <input 
                    type="text"
                    name="caixa-assunto"
                    id="caixa-assunto"
                    placeholder="Assunto" 
                >
            </label>

            <br>
            <br>

            <label class="mensagem">
                <input 
                    type="text"
                    name="caixa-mensagem"
                    id="caixa-mensagem"
                    placeholder="Digite sua Mensagem"
                >
            </label>

            <!-- Caixa do Botão -->
            <div class="enviar">
                <input 
                type="submit"
                name="botao-enviar"
                id="botao-enviar"
                value="Enviar"
                >
            </div>
        </fieldset>
    </main>

    <!-- Rodapé do site -->
    <footer>
      <div class="container rodape">
        <p>pixelForgeStudios@gmail.com.br</p>
        <p>999-999-999</p>
        <p>@2026</p>
      </div>
    </footer>
</body>
</html>
